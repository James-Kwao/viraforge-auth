<!DOCTYPE html>
<html>
<head>
    <title>ViraForge Auth Success</title>
</head>
<body style="background: #0A0A0B; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
    <div style="text-align: center;">
        <h2>Connection Successful</h2>
        <p>Redirecting back to the Forge...</p>
    </div>

    <script>
        // 1. Grab params from URL: callback.html?code=XYZ&state=TikTok
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const platform = urlParams.get('state');

        if (code && platform) {
            // 2. Open the Flutter app using the custom scheme
            // We pass the code and platform so Flutter knows what to verify
            const deepLink = `viraforge://auth-callback?code=${code}&platform=${platform}`;
            window.location.href = deepLink;

            // Optional: Fallback button if auto-redirect fails
            setTimeout(() => {
                document.body.innerHTML += `<a href="${deepLink}" style="color: #6C63FF;">Click here if not redirected</a>`;
            }, 2500);
        } else {
            document.body.innerHTML = "<h2>Error: No auth code found.</h2>";
        }
    </script>
</body>
</html>
