name: Hourly Trend Scraper

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual trigger

# REQUIRED: Grants the workflow permission to commit changes back to the repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 for better stability

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: '20' # Using Node 20 to fix the "File is not defined" error

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run Scraper
        run: node scraper.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trends.json
          # Only commit if there are changes to avoid failing the build
          git commit -m "Auto-update trends" || echo "No changes to commit"
          git push
