name: Hourly Trend Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Use 22 to be safe
          cache: 'npm'      # Added caching to speed up installs

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run Scraper
        run: node scraper.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trends.json
          git commit -m "Auto-update trends" || echo "No changes to commit"
          git push
